name: Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # update wiki with coverage badge + report
      pull-requests: write   # post coverage diff comments on PRs
    steps:
      - uses: actions/checkout@v4

      - name: Install Bazelisk
        env:
          BAZELISK_VERSION: "v1.29.0"
          BAZELISK_SHA256: "5a408715e932c0250d28bd84555f12edbf70117de42f9181691c736eacc4a992"
        run: |
          curl -fsSL "https://github.com/bazelbuild/bazelisk/releases/download/${BAZELISK_VERSION}/bazelisk-linux-amd64" -o /tmp/bazelisk
          echo "${BAZELISK_SHA256}  /tmp/bazelisk" | sha256sum -c
          sudo install -m 755 /tmp/bazelisk /usr/local/bin/bazel
          bazel version

      - name: Build
        run: bazel build //cmd/nomad-botherer //cmd/nbctl

      - name: Test
        run: bazel test //...

      # setup-go is needed for go vet, coverage report, and the go-coverage-report
      # action. Bazel's LCOV output is not compatible with go-coverage-report.
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Coverage report
        run: go test -race -timeout 60s -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        uses: ncruces/go-coverage-report@v0
        with:
          coverage-file: coverage.out
          chart: true
        continue-on-error: true   # non-fatal: wiki may not exist on first run
