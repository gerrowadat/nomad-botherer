name: Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # update wiki with coverage badge + report
      pull-requests: write   # post coverage diff comments on PRs
    steps:
      - uses: actions/checkout@v4

      - name: Install Bazelisk
        run: |
          npm install -g @bazel/bazelisk
          bazel version

      - name: Test
        run: bazel test //...

      # Coverage report uses go test because Bazel's LCOV output is not
      # compatible with the go-coverage-report action.
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Coverage report
        run: go test -race -timeout 60s -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        uses: ncruces/go-coverage-report@v0
        with:
          coverage-file: coverage.out
          chart: true
        continue-on-error: true   # non-fatal: wiki may not exist on first run
